<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindPulse Logo 预览</title>
  <style>
    :root {
      --bg-dark: #090a0f;
      --bg-card: #12131a;
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      max-width: 800px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #69ad9b, #9b9eff, #61649f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
      max-width: 1000px;
      width: 100%;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .section-title {
      grid-column: 1 / -1;
      font-size: 20px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-top: 24px;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .logo-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .logo-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .preview-box {
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      position: relative;
    }

    /* Option B Visual Mockup (Finalized) */
    .flat-icon-bg {
      width: 160px;
      height: 160px;
      background: #000;
      border-radius: 36px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    }

    .flat-logo-svg {
      width: 96px;
      height: 96px;
      display: block;
    }

    .flat-ring-circle {
      transform-origin: center;
      animation: flat-spin 3.5s linear infinite;
    }

    .flat-pulse-path {
      stroke: rgba(255, 255, 255, 0.85);
    }

    .draft-img {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 20px;
      background: #000;
    }

    .logo-meta {
      text-align: center;
    }

    .logo-meta h3 {
      font-size: 18px;
      margin: 0 0 8px;
      color: var(--text-primary);
    }

    .logo-meta p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin: 0;
    }

    @keyframes flat-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <header>
    <h1>MindPulse 官方 Logo 预览</h1>
    <p>MindPulse 设计理念：状态可见，注意力不可分割。圆环缺口与非缺口符合黄金比例，中心脉搏波形稳定静止。下方提供 HTML 动态渲染模型与高分辨率静态图的直观比对。</p>
  </header>

  <div class="container">
    
    <!-- SVG Gradient Definitions (Hidden) -->
    <svg width="0" height="0" style="position: absolute;">
      <defs>
        <!-- Option B: Vibrant Neon gradient -->
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#69ad9b" />
          <stop offset="50%" stop-color="#9b9eff" />
          <stop offset="100%" stop-color="#61649f" />
        </linearGradient>
      </defs>
    </svg>

    <!-- SECTION: HTML Dynamic Render -->
    <div class="section-title">HTML 动态渲染原型</div>

    <!-- Live SVG Mockup Card -->
    <div class="logo-card" style="grid-column: 1 / -1; max-width: 600px; margin: 0 auto; width: 100%;">
      <div class="preview-box">
        <div class="flat-icon-bg">
          <svg class="flat-logo-svg" viewBox="0 0 56 56">
            <circle class="flat-ring-circle" stroke="url(#grad2)" cx="28" cy="28" r="24" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="31.07 19.20" />
            <path class="flat-pulse-path" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M 14 28 L 20 28 L 22 31 L 25 14 L 28 42 L 31 30 L 33 28 L 42 28" />
          </svg>
        </div>
      </div>
      <div class="logo-meta">
        <h3>动态渲染效果</h3>
        <p>极致极客扁平风。纯黑背景衬托强对比度的霓虹旋转呼吸环与中心白色静止心跳线。白色的心率基准线静止稳定，与旋转圆环完美动静结合，诠释“MindPulse”设计理念。</p>
      </div>
    </div>

    <!-- SECTION: Static Draft Images -->
    <div class="section-title">高分辨率静态 Logo</div>

    <!-- Option B Image -->
    <div class="logo-card" style="grid-column: 1 / -1; max-width: 600px; margin: 0 auto; width: 100%;">
      <img src="logo.png" alt="MindPulse Logo" class="draft-img">
      <div class="logo-meta">
        <h3>logo.png</h3>
        <p>在本地查看大图：<br><a href="logo.png" style="color: #69ad9b; text-decoration: none;">doc/logo/logo.png</a></p>
      </div>
    </div>

  </div>

</body>
</html>
