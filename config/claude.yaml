# https://code.claude.com/docs/en/hooks
claude:
  name: "Claude Code"
  events:
    # 1. Session and startup lifecycle
    SessionStart: "SESSION_START"           # Session starts or resumes
    Setup: "SESSION_START"                  # Environment setup for --init or --maintenance
    SessionEnd: "SESSION_END"               # Session exits or ends
    InstructionsLoaded: "SESSION_ACTIVE"    # CLAUDE.md or rules loaded; fallback when SessionStart is missing
    ConfigChange: "NOOP"                    # Config file changed during a session; keep tool counters unchanged

    # 2. User interaction and input
    UserPromptSubmit: "USER_PROMPT_SUBMIT"   # User submitted a prompt; Claude starts processing
    UserPromptExpansion: "USER_PROMPT_SUBMIT" # Command expanded into a prompt for Claude

    # 3. Tool invocation lifecycle (drives nested active tool count)
    PreToolUse: "TOOL_START"                # Before a tool call (active_tool_count++)
    PostToolUse: "TOOL_END"                 # Tool call completed successfully (active_tool_count--)
    PostToolUseFailure: "TOOL_END"          # Tool call failed (active_tool_count--)
    PostToolBatch: "AGENT_RUNNING"          # A parallel tool batch completed; the next model call is expected

    # 4. Permission and elicitation gates (PENDING state)
    PermissionRequest: "PERMISSION_REQUEST" # Permission prompt is waiting for user approval (PENDING)
    PermissionDenied: "PERMISSION_DENIED"   # Auto-mode classifier denied a tool call; Claude regains control
    Elicitation: "PERMISSION_REQUEST"       # MCP server asks for user input during a tool call (PENDING)
    ElicitationResult: "AGENT_RUNNING"      # User replied to MCP input; Claude resumes processing

    # 5. Turn completion and stop signals
    Stop: "AGENT_STOP"                      # Current response completed normally (IDLE)
    StopFailure: "AGENT_STOP"               # Current response stopped after an API/runtime error (IDLE)
    TeammateIdle: "NOOP"                    # Teammate agent is about to idle; no main state change

    # 6. Subtasks and concurrent subagents
    SubagentStart: "TOOL_START"             # Spawned and started a subagent (active_tool_count++)
    SubagentStop: "TOOL_END"                # Subagent finished (active_tool_count--)
    TaskCreated: "TOOL_START"               # Async long-running task created (active_tool_count++)
    TaskCompleted: "TOOL_END"               # Async long-running task completed (active_tool_count--)

    # 7. Environment and filesystem events
    CwdChanged: "NOOP"                      # Working directory changed; independent async event
    FileChanged: "NOOP"                     # Watched file changed on disk; independent async event
    WorktreeCreate: "NOOP"                  # Git worktree created; may span the whole session
    WorktreeRemove: "NOOP"                  # Git worktree removed

    # 8. Compaction and low-level adjustment events
    PreCompact: "AGENT_RUNNING"             # Before context compaction
    PostCompact: "AGENT_RUNNING"            # Context compaction completed

    # 9. Auxiliary and message display events
    Notification: "NOOP"                    # Desktop notification; mixed semantics, no direct state change
    MessageDisplay: "AGENT_RUNNING"         # Assistant message is being displayed/typed
